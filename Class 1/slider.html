<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8"/>
    <title>Amazing Slider</title>

<body>

    <div class="amazingslider-wrapper" id="amazingslider-wrapper-1" style="display:block;position:relative;max-width:900px;margin:0px auto 98px;">
        <div class="amazingslider" id="amazingslider-1" style="display:block;position:relative;margin:0 auto;">
            <ul class="amazingslider-slides" style="display:none;">
                <li><img src="images/3%20%282%29.png" alt="3 (2)"  title="3 (2)" />

                <li><img src="images/2%20%281%29.png" alt="2 (1)"  title="2 (1)" />
<a href="https://cloudconvert.com/jpg-to-png"><button class="amazingsliderbutton as-btn-blue-medium">LINK 1</button></a>

                <li><img src="images/1%20%283%29.png" alt="1 (3)"  title="1 (3)" />
<a href="https://www.youtube.com/"><button class="amazingsliderbutton as-btn-orange-large">REGISTER FORM</button></a>

                <li><img src="images/3%20%281%29-tn.png" alt="3 (1)" title="3 (1)" /></li>

        <div class="amazingslider-engine"><a href="http://amazingslider.com" title="Responsive Slider jQuery">Responsive Slider jQuery</a></div>
        </div>
